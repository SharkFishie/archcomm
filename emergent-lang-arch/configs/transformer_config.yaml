# Transformer-specific config — lower LR, linear warmup, higher entropy coeff, smaller hidden dim
# Based on base_config.yaml

experiment:
  name: "transformer_tuned"
  seed: 42
  arch: "transformer"
  device: "cpu"         # cuda | cpu

game:
  n_objects: 100
  n_features: 32
  n_distractors: 4
  n_train: 50000
  n_val: 5000
  n_test: 5000

agent:
  input_dim: 32
  hidden_dim: 128       # smaller than base (256) — less overfit in small RL setting
  vocab_size: 50
  max_len: 5
  embed_dim: 64
  nhead: 4
  num_layers: 2
  mlp_layers: 3

training:
  epochs: 100
  batch_size: 256
  lr: 1.0e-4            # lower LR than base (1e-3) — transformer more sensitive
  warmup_epochs: 10     # linear LR warmup from lr/10 → lr over first 10 epochs
  sender_entropy_coeff: 0.05   # higher than base (0.01) — prevent message collapse
  receiver_entropy_coeff: 0.001
  grad_clip: 1.0
  eval_every: 5

logging:
  use_wandb: false
  wandb_project: "emergent-lang-arch"
  results_dir: "results"
  log_messages: true
