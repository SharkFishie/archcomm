# Dev config for fast local testing — identical to base_config except smaller data/epochs
experiment:
  name: "dev"
  seed: 42
  arch: "lstm"          # lstm | gru | transformer | mlp
  device: "cpu"

game:
  n_objects: 100
  n_features: 32
  n_distractors: 4
  n_train: 2000
  n_val: 200
  n_test: 200

agent:
  input_dim: 32
  hidden_dim: 256
  vocab_size: 50
  max_len: 5
  embed_dim: 64
  nhead: 4
  num_layers: 2
  mlp_layers: 3

training:
  epochs: 20
  batch_size: 64
  lr: 1.0e-3
  sender_entropy_coeff: 0.01
  receiver_entropy_coeff: 0.001
  grad_clip: 1.0
  eval_every: 5

logging:
  use_wandb: false
  wandb_project: "emergent-lang-arch"
  results_dir: "results"
  log_messages: true
