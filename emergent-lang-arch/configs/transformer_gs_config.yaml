# Transformer + Gumbel-Softmax config
# Run with: python scripts/train.py --config configs/transformer_gs_config.yaml --gumbel --seed 42
# Results save to results/transformer_gs/seed_{seed}/ (separate from REINFORCE transformer runs)

experiment:
  name: "gs"
  seed: 42
  arch: "transformer"
  device: "cuda"        # cuda | cpu — GPU recommended for full sweep

game:
  n_objects: 100
  n_features: 32
  n_distractors: 4
  n_train: 50000
  n_val: 5000
  n_test: 5000

agent:
  input_dim: 32
  hidden_dim: 128       # smaller model, consistent with transformer_config tuning
  vocab_size: 50
  max_len: 5
  embed_dim: 64
  nhead: 4
  num_layers: 2
  mlp_layers: 3
  temperature: 1.0      # Gumbel-Softmax temperature

training:
  epochs: 100
  batch_size: 256
  lr: 1.0e-4            # lower LR — same reasoning as transformer_config
  warmup_epochs: 10
  sender_entropy_coeff: 0.01    # unused in GS mode, kept for schema consistency
  receiver_entropy_coeff: 0.001 # unused in GS mode
  length_cost: 0.0              # penalty per extra symbol (GS-specific)
  grad_clip: 1.0
  eval_every: 5

logging:
  use_wandb: false
  wandb_project: "emergent-lang-arch"
  results_dir: "results"
  log_messages: true
